name: GitHub-Profile-3D-Contrib

on:
  schedule: # Runs automatically every day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push Generated Images
        run: |
          git config user.name github-actions
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A .
          git commit -m "chore: updated 3d contribution graph" || exit 0
          git push
